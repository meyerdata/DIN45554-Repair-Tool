<div class="table-container">
  <h3>Explanation of the criteria</h3>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th rowspan="2">Criteria</th>
        <th colspan="8">Points</th>
        <th rowspan="2">Description</th>
      </tr>
      <tr>
        <th>A</th>
        <th>B</th>
        <th>C</th>
        <th>D</th>
        <th>E</th>
        <th>F</th>
        <th>G</th>
        <th>H</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let explanation of explanations">
        <td>{{ explanation.criterion }}</td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.A"
            (input)="updateClassPointsMapping(explanation.criterion, 'A', explanation.points.A)"
          />
        </td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.B"
            (input)="updateClassPointsMapping(explanation.criterion, 'B', explanation.points.B)"
          />
        </td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.C"
            (input)="updateClassPointsMapping(explanation.criterion, 'C', explanation.points.C)"
          />
        </td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.D"
            (input)="updateClassPointsMapping(explanation.criterion, 'D', explanation.points.D)"
          />
        </td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.E"
            (input)="updateClassPointsMapping(explanation.criterion, 'E', explanation.points.E)"
          />
        </td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.F"
            (input)="updateClassPointsMapping(explanation.criterion, 'F', explanation.points.F)"
          />
        </td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.G"
            (input)="updateClassPointsMapping(explanation.criterion, 'G', explanation.points.G)"
          />
        </td>
        <td>
          <input
            type="number"
            [(ngModel)]="explanation.points.H"
            (input)="updateClassPointsMapping(explanation.criterion, 'H', explanation.points.H)"
          />
        </td>
        <td>{{ explanation.description }}</td>
      </tr>
    </tbody>
  </table>
</div>
